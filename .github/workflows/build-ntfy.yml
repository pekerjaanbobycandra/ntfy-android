name: Build Cluring Notification APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Persiapkan Rahasia & Identitas Aplikasi
        run: |
          # 1. Suntik Firebase
          echo '${{ secrets.FIREBASE_JSON }}' > app/google-services.json
          echo '${{ secrets.FIREBASE_JSON }}' > app/src/play/google-services.json
          
          # 2. Bangkitkan kembali file Keystore dari teks rahasia
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/cluring-release.keystore
          
          # 3. UBAH NAMA APLIKASI MENJADI "Clu.RING" (Sapu jagat semua file XML)
          find app/src/main/res -type f -name "*.xml" -exec sed -i 's/>ntfy</>Clu.RING</g' {} +
          
          # 4. Ubah identitas luar (Application ID) & buang buntut debug
          sed -i 's/applicationId "io.heckel.ntfy"/applicationId "com.desacluring.hub"/g' app/build.gradle
          sed -i 's/applicationIdSuffix ".debug"//g' app/build.gradle
          
          # 5. Gembos alamat server default
          find . -type f -name "*.xml" -exec sed -i 's|https://ntfy.sh|https://hub.desacluring.com|g' {} +
          
          # 6. DIET KETAT: Hanya pertahankan bahasa ID/EN & buang arsitektur Intel x86/x86_64
          sed -i '/defaultConfig {/a \        resConfigs "en", "id"\n        ndk { abiFilters "armeabi-v7a", "arm64-v8a" }' app/build.gradle
          
          # 7. MENGUBAH NAMA VERSI (Menjadi Desa Cluring Team - Versi 1.25.0)
          find app/src/main/res -type f -name "*.xml" -exec sed -i 's/%1$s %2$s (%3$s)/Desa Cluring Team - Versi %2$s/g' {} +
          find app/src/main/res -type f -name "*.xml" -exec sed -i 's/ntfy %1$s (%2$s)/Desa Cluring Team - Versi %1$s/g' {} +

      - name: Jalankan Proses Perakitan (Play/FCM RELEASE Flavor)
        run: |
          chmod +x gradlew
          # Menjalankan build rilis dengan menyuntikkan Keystore rahasia
          ./gradlew assemblePlayRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/cluring-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon

      - name: Upload Hasil APK Resmi
        uses: actions/upload-artifact@v4
        with:
          name: Notif-Desa-Cluring-Release
          path: app/build/outputs/apk/play/release/*.apk
